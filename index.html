<!-- Agrega esto dentro del <body> -->
<h1>Formulario de Asistencia</h1>

<form id="formularioAsistencia">
    <!-- Campos del formulario -->
    ...
</form>

<!-- Nuevo botón para importar Excel -->
<input type="file" id="importarExcel" accept=".xlsx" style="display: block; margin: 10px auto;">

<!-- Botón para exportar manualmente -->
<button class="btn-export" onclick="exportarExcel()">Exportar a Excel</button>

<!-- Tabla -->
<table>
    ...
</table>

<script>
    let filaEditando = null;

    document.addEventListener("DOMContentLoaded", cargarDesdeLocalStorage);
    document.getElementById("importarExcel").addEventListener("change", importarExcel);

    function agregarOActualizar() {
        const apellido = document.getElementById('apellido').value.trim();
        const nombre = document.getElementById('nombre').value.trim();
        const dni = document.getElementById('dni').value.trim();
        const estado = document.getElementById('estado').value;

        if (!nombre || !apellido || !dni) {
            alert('Por favor, complete todos los campos.');
            return;
        }

        if (filaEditando) {
            filaEditando.cells[0].textContent = apellido;
            filaEditando.cells[1].textContent = nombre;
            filaEditando.cells[2].textContent = dni;
            filaEditando.cells[3].textContent = estado;
            filaEditando = null;
        } else {
            const tabla = document.getElementById('tablaAsistencia');
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${apellido}</td>
                <td>${nombre}</td>
                <td>${dni}</td>
                <td>${estado}</td>
                <td>
                    <button class="btn btn-edit" onclick="editarFila(this)">Editar</button>
                    <button class="btn btn-delete" onclick="borrarFila(this)">Borrar</button>
                </td>
            `;
            tabla.appendChild(fila);
        }

        guardarYExportar(); // Backup automático
        document.getElementById('formularioAsistencia').reset();
    }

    function editarFila(boton) {
        filaEditando = boton.parentElement.parentElement;
        document.getElementById('apellido').value = filaEditando.cells[0].textContent;
        document.getElementById('nombre').value = filaEditando.cells[1].textContent;
        document.getElementById('dni').value = filaEditando.cells[2].textContent;
        document.getElementById('estado').value = filaEditando.cells[3].textContent;
    }

    function borrarFila(boton) {
        const fila = boton.parentElement.parentElement;
        fila.remove();
        guardarYExportar(); // Backup automático
    }

    function guardarEnLocalStorage() {
        const tabla = document.getElementById('tablaAsistencia');
        const filas = Array.from(tabla.rows).map(fila => [
            fila.cells[0].textContent,
            fila.cells[1].textContent,
            fila.cells[2].textContent,
            fila.cells[3].textContent
        ]);
        localStorage.setItem('asistencia', JSON.stringify(filas));
    }

    function guardarYExportar() {
        guardarEnLocalStorage();
        exportarExcel();
    }

    function cargarDesdeLocalStorage() {
        const datos = localStorage.getItem('asistencia');
        if (!datos) return;
        const filas = JSON.parse(datos);
        const tabla = document.getElementById('tablaAsistencia');
        filas.forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${f[0]}</td>
                <td>${f[1]}</td>
                <td>${f[2]}</td>
                <td>${f[3]}</td>
                <td>
                    <button class="btn btn-edit" onclick="editarFila(this)">Editar</button>
                    <button class="btn btn-delete" onclick="borrarFila(this)">Borrar</button>
                </td>
            `;
            tabla.appendChild(tr);
        });
    }

    function exportarExcel() {
        const tabla = document.getElementById('tablaAsistencia');
        const filas = Array.from(tabla.rows).map(fila => [
            fila.cells[0].textContent,
            fila.cells[1].textContent,
            fila.cells[2].textContent,
            fila.cells[3].textContent
        ]);
        const ws = XLSX.utils.aoa_to_sheet([
            ['Apellido', 'Nombre', 'DNI', 'Estado'],
            ...filas
        ]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
        const fecha = new Date().toISOString().split('T')[0];
        XLSX.writeFile(wb, `asistencia_${fecha}.xlsx`);
    }

    function importarExcel(e) {
        const archivo = e.target.files[0];
        if (!archivo) return;

        const lector = new FileReader();
        lector.onload = function (e) {
            const datos = new Uint8Array(e.target.result);
            const libro = XLSX.read(datos, { type: 'array' });
            const hoja = libro.Sheets[libro.SheetNames[0]];
            const filas = XLSX.utils.sheet_to_json(hoja, { header: 1 }).slice(1); // quitar encabezado

            const tabla = document.getElementById('tablaAsistencia');
            tabla.innerHTML = '';

            filas.forEach(f => {
                if (f.length >= 4) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${f[0]}</td>
                        <td>${f[1]}</td>
                        <td>${f[2]}</td>
                        <td>${f[3]}</td>
                        <td>
                            <button class="btn btn-edit" onclick="editarFila(this)">Editar</button>
                            <button class="btn btn-delete" onclick="borrarFila(this)">Borrar</button>
                        </td>
                    `;
                    tabla.appendChild(tr);
                }
            });

            guardarEnLocalStorage(); // guardar los importados
            exportarExcel(); // hacer backup
        };
        lector.readAsArrayBuffer(archivo);
    }
</script>

<!-- Librería para Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script>
