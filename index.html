<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Consultores</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#003366;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.btn-add{
    background:#28a745;
}

.btn-export{
    background:#0d6efd;
}

.btn-edit{
    background:#ffc107;
    color:black;
}

.btn-delete{
    background:#dc3545;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#003366;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

tr:nth-child(even){
    background:#f8f9fa;
}
</style>
</head>
<body>

<div class="container">

<h1>Registro de Consultores</h1>

<form id="formulario">

<div class="form-grid">

<div>
<label>Número de Registro</label>
<input type="text" id="registro">
</div>

<div>
<label>Nombre</label>
<input type="text" id="nombre">
</div>

<div>
<label>CUIL</label>
<input type="text" id="cuil">
</div>

<div>
<label>Razón Social</label>
<input type="text" id="razonSocial">
</div>

</div>

<div class="actions">
<button type="button" class="btn-add" onclick="agregarOActualizar()">
Guardar Registro
</button>

<button type="button" class="btn-export" onclick="exportarExcel()">
Exportar Excel
</button>
</div>

</form>

<table>

<thead>
<tr>
<th>N° Registro</th>
<th>Nombre</th>
<th>CUIL</th>
<th>Razón Social</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaConsultores"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

let filaEditando = null;

document.addEventListener("DOMContentLoaded", cargarDatos);

function agregarOActualizar(){

const registro = document.getElementById("registro").value.trim();
const nombre = document.getElementById("nombre").value.trim();
const cuil = document.getElementById("cuil").value.trim();
const razonSocial = document.getElementById("razonSocial").value.trim();

if(!registro || !nombre || !cuil || !razonSocial){
    alert("Complete todos los campos");
    return;
}

if(filaEditando){

    filaEditando.cells[0].textContent = registro;
    filaEditando.cells[1].textContent = nombre;
    filaEditando.cells[2].textContent = cuil;
    filaEditando.cells[3].textContent = razonSocial;

    filaEditando = null;

}else{

const fila = document.createElement("tr");

fila.innerHTML = `
<td>${registro}</td>
<td>${nombre}</td>
<td>${cuil}</td>
<td>${razonSocial}</td>
<td>
<button class="btn-edit" onclick="editarFila(this)">Editar</button>
<button class="btn-delete" onclick="borrarFila(this)">Eliminar</button>
</td>
`;

document.getElementById("tablaConsultores").appendChild(fila);

}

guardarDatos();

document.getElementById("formulario").reset();

}

function editarFila(btn){

filaEditando = btn.parentElement.parentElement;

document.getElementById("registro").value =
filaEditando.cells[0].textContent;

document.getElementById("nombre").value =
filaEditando.cells[1].textContent;

document.getElementById("cuil").value =
filaEditando.cells[2].textContent;

document.getElementById("razonSocial").value =
filaEditando.cells[3].textContent;

}

function borrarFila(btn){

if(confirm("¿Eliminar registro?")){

btn.parentElement.parentElement.remove();

guardarDatos();

}

}

function guardarDatos(){

const filas = [];

document.querySelectorAll("#tablaConsultores tr").forEach(fila => {

filas.push([
fila.cells[0].textContent,
fila.cells[1].textContent,
fila.cells[2].textContent,
fila.cells[3].textContent
]);

});

localStorage.setItem(
"consultores",
JSON.stringify(filas)
);

}

function cargarDatos(){

const datos = localStorage.getItem("consultores");

if(!datos) return;

const filas = JSON.parse(datos);

const tabla =
document.getElementById("tablaConsultores");

filas.forEach(fila => {

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${fila[0]}</td>
<td>${fila[1]}</td>
<td>${fila[2]}</td>
<td>${fila[3]}</td>
<td>
<button class="btn-edit" onclick="editarFila(this)">Editar</button>
<button class="btn-delete" onclick="borrarFila(this)">Eliminar</button>
</td>
`;

tabla.appendChild(tr);

});

}

function exportarExcel(){

const datos = [
['Número de Registro','Nombre','CUIL','Razón Social']
];

document.querySelectorAll("#tablaConsultores tr")
.forEach(fila => {

datos.push([
fila.cells[0].textContent,
fila.cells[1].textContent,
fila.cells[2].textContent,
fila.cells[3].textContent
]);

});

const ws = XLSX.utils.aoa_to_sheet(datos);

const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Consultores"
);

XLSX.writeFile(
wb,
"Registro_Consultores.xlsx"
);

}

</script>

</body>
</html>
